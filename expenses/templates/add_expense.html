{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card p-4">
            <h3 class="mb-4 text-center">
                Add New Expense
            </h3>

            <form method="POST">
                {% csrf_token %}

                <div class="mb-3">
                    <label class="form-label">Amount</label>
                    {{form.amount}}
                </div>

                <div class="mb-3">
                    <label class="form-label">Caregory</label>
                    {{ form.category }}
                </div>

                <div class="mb-3">
                    <label class="form-label">Date</label>
                    {{ form.date }}
                </div>
                
                <div class="mb-3">
                    <label>Description</label>
                    {{ form.description }}
                </div>

                <button type="submit" class="btn btn-primary w-100">Add Expense</button>
            </form>
        </div>
    </div>
</div>

{% endblock %}
